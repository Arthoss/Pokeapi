services:
  anime-api:
    build: .
    container_name: anime-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=aws-1-us-west-2.pooler.supabase.com
      - DB_PORT=5432
      - DB_NAME=postgres
      - DB_USER=postgres.fxhjebhivdqnbaqyjrgx
      - DB_PASS=DeyaLuna2005.
      - JWT_SECRET=anime_secret_key_2025
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

volumes:
  sonarqube_data:
  sonarqube_logs: